<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <header>
        <nav aria-label="Menu principal">
            <ul class="menu">
                <li><a href="inicio.html">Início</a></li>
                <li><a href="index.html">Formulário</a></li>
                <li><a href="tabela.html">Tabela</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <article>
            <h1>Cadastro de Cliente</h1>
            <form aria-labelledby="titulo-form">
                <fieldset>
                    <legend id="titulo-form">Dados Pessoais</legend>
                    <section class="grupo">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" name="nome" required aria-required="true">
                    </section>
                    <section class="grupo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required aria-required="true">
                   </section>
                   <section class="grupo">
                       <label for="telefone">Telefone</label>
                       <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">
                    </section>
                    <section class="grupo">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" required aria-required="true">
                    </section>
                    <section class="sexo">
                        <label for="sexo">Obrigatório preencher o campo:</label>
                        <input type="radio" name="sexo" value="feminino">
                        <label for="feminino">Feminino</label>
                        <input type="radio" name="sexo" value="Masculino">
                        <label for="Masculino">Masculino</label>
                    </section>
                    </fieldset>
                <fieldset>
                    <legend>Endereço</legend>
                        <section class="grupoDois">
                            <label for="rua">Rua</label>
                            <input type="text" id="rua" name="rua">
                        </section>
                        <section class="grupoDois">
                            <label for="cidade">Cidade</label>
                            <input type="text" id="cidade" name="cidade">
                        </section>
                        <section class="grupoDois">
                            <label for="estado">Estado</label>
                            <input type="text" id="estado" name="estado">
                       </section>
                       <section class="grupoDois">
                            <label for="cep">CEP</label>
                            <input type="text" id="cep" name="cep">
                       </section>
                </fieldset>
                <fieldset>
                    <legend>Deixe Uma mensagem:</legend>
                    <section>
                        <label for="mensagem"></label>
                        <textarea id="msg" rows="8" cols="60"></textarea>
                    </section>
                </fieldset>
                    <section class="botao">
                        <button type="submit">Cadastrar</button>
                        <button type="submit">Limpar Cadastro</button>
                    </section>
            </form>
        </article>
    </main>
</body>
</html>
